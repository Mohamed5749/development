name: Auto Merge on Comment

on:
  issue_comment:
    types: [created]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request != null # only run on PR comments
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Auto merge PR on "merge" comment
        uses: devops-infra/action-pull-request@v0.5.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          merge_method: merge  # changed from squash to merge
        if: contains(github.event.comment.body, 'merge')
