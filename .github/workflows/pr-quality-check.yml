name: PR Quality Checks & Auto Merge (with Debug)

on:
  pull_request:
    types: [opened, reopened, labeled, unlabeled, synchronize]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: write

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'check') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install black
      - run: black --check .
      - run: python -m compileall -q .

  debug-job:
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment'
    steps:
      - name: Print key values
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Comment body: ${{ github.event.comment.body }}"
          echo "Is this a PR? ${{ github.event.issue.pull_request }}"
      - name: Dump full event payload
        run: |
          echo "Event file path: $GITHUB_EVENT_PATH"
          cat $GITHUB_EVENT_PATH

  auto-merge:
    needs: quality-checks
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.comment.body == 'merge'
    steps:
      - name: Merge the pull request into development
        uses: peter-evans/merge-pull-request@v3
        with:
          pull-request: ${{ github.event.issue.number }}
          method: squash
          commit-message: "Auto-merged PR into development"
