name: PR Quality Checks

on:
  pull_request:
    types: [opened, reopened, labeled, unlabeled, synchronize]
  issue_comment:
    types: [created]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'check') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.comment.body == 'recheck')
    steps:
      # Step 1: Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install dependencies
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install black yamllint

      # Step 4: Black formatting check
      - name: Black format check
        run: black --check .

      # Step 5: Python syntax check
      - name: Python syntax check
        run: python -m compileall -q .

      # Step 6: YAML lint check
      - name: Lint YAML files
        run: yamllint .  # Lint all YAML files
