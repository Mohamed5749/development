name: PR Quality Checks & Auto Merge

on:
  pull_request:
    types: [opened, reopened, labeled, unlabeled, synchronize]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: write

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'check') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install black
      - id: checks
        run: |
          black --check .
          python -m compileall -q .
          echo "All checks passed"

  auto-merge:
    needs: quality-checks
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request
    steps:
      - name: Auto-merge PR to main if comment is "merge"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = context.payload.comment.body.trim().toLowerCase();
            if (comment === "merge") {
              const pr_number = context.payload.issue.number;

              // Only merge if quality checks passed
              const checksPassed = '${{ needs.quality-checks.result }}';
              if (checksPassed !== 'success') {
                console.log("Quality checks did not pass. Skipping merge.");
              } else {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr_number,
                  merge_method: "squash",
                  commit_title: `Auto-merged PR #${pr_number} into main`,
                  commit_message: "Merged via comment 'merge'"
                });
                console.log(`PR #${pr_number} has been merged into main.`);
              }
            } else {
              console.log("Comment is not 'merge'; skipping.");
            }
