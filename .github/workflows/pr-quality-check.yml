name: PR Quality Checks & Auto Merge

on:
  pull_request:
    types: [opened, reopened, labeled, unlabeled, synchronize]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: write

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install black
      - id: checks
        run: |
          black --check .
          python -m compileall -q .
          echo "All checks passed"

  auto-merge:
    runs-on: ubuntu-latest
    needs: quality-checks
    steps:
      - name: Debug event payload
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "PR exists: ${{ github.event.issue?.pull_request }}"
          echo "Comment body: '${{ github.event.comment.body }}'"

      - name: Auto-merge PR if comment is 'merge'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Ensure this is a PR comment
            if (!context.payload.issue?.pull_request) {
              console.log("Not a PR comment; skipping.");
              return;
            }

            // Normalize comment text
            const comment = context.payload.comment.body.trim().toLowerCase();
            if (comment !== "merge") {
              console.log("Comment is not 'merge'; skipping.");
              return;
            }

            // Ensure quality checks passed
            let checksPassed = true;
            if ('needs' in context && 'quality-checks' in context.needs) {
              checksPassed = context.needs['quality-checks'].result === 'success';
            }

            if (!checksPassed) {
              console.log("Quality checks did not pass. Skipping merge.");
              return;
            }

            const pr_number = context.payload.issue.number;
            console.log(`Merging PR #${pr_number} into development...`);

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
              merge_method: "squash",
              commit_title: `Auto-merged PR #${pr_number} into development`,
              commit_message: "Merged via comment 'merge'"
            });

            console.log(`PR #${pr_number} merged successfully.`);
